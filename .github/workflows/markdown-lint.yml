---
name: Documentation Quality & Linting

"on":
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Markdown Lint
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: "."
          config_file: ".markdownlint.json"